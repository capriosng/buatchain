<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Chainn Cantik Tersayang ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Menggunakan foto_kita.jpeg sebagai background utama dengan overlay warna pink transparan */
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.6), rgba(255, 194, 209, 0.6)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Halaman Pembuka (Overlay) */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Menyamakan background pembuka agar senada dengan body */
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.7), rgba(255, 194, 209, 0.7)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .btn-buka {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff477e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* Kontainer Utama SEKARANG TRANSPARAN PENUH */
        .container {
            text-align: center;
            background: transparent; /* Latar belakang putih dihapus */
            padding: 30px;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            display: none; /* Sembunyi dulu sebelum diklik */
        }

        .container.show {
            display: block;
            animation: fadeIn 2s ease-in-out;
        }

        /* Bingkai Foto dengan Animasi Zoom */
        .photo-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff85a1;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: softZoom 8s ease-in-out infinite alternate;
        }

        /* Teks Romantis - WARNA DIUBAH KE PUTIH AGAR TERBACA */
        h1 {
            color: #ffffff; /* Ubah ke putih */
            font-size: 26px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* Menambah kontras */
        }

        p {
            color: #ffffff; /* Ubah ke putih */
            font-weight: 600;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* Musik Kontrol */
        .music-box {
            margin-top: 15px;
        }

        audio {
            width: 100%;
            max-width: 300px;
            border-radius: 30px;
        }

        /* Animasi Hati Berjatuhan - UKURAN DIPERBESAR */
        .heart {
            position: absolute;
            color: #ff7096;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        /* Kumpulan Keyframes Animasi */
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes softZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="welcome-screen" id="welcomeScreen">
        <h2 style="color: #ff477e; margin-bottom: 20px; text-shadow: 1px 1px 5px white;">DIBACA YA SAYANG ✨</h2>
        <button class="btn-buka" onclick="mulaiHalaman()">Klik di Sini ❤️</button>
    </div>

    <div class="container" id="mainContainer">
        <div class="photo-frame">
            <img src="foto_kita.jpeg" alt="Foto Kita">
        </div>

        <h1>Untuk Chainn Cantik Tersayang... ❤️</h1>
        
        <p>
            "SELAMAT PAGIIII CINTAKUUUU, JANGAN BANYAK MAKAN GADUNG YA"
        </p>

        <div class="music-box">
            <audio id="laguAyang" controls loop preload="auto">
                <source src="musik_kita.mp3" type="audio/mpeg">
                Browser kamu tidak mendukung pemutar musik ini.
            </audio>
        </div>
    </div>

    <script>
        // Efek Animasi Hati Berjatuhan - UKURAN DIPERBESAR MELALUI JS
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; // Sedikit lebih lambat agar terlihat megah
            // Ukuran diperbesar: minimal 30px, maksimal 60px
            heart.style.fontSize = Math.random() * 30 + 30 + 'px'; 
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000); // Durasi hidup disesuaikan dengan animasi yang lebih lambat
        }

        // Fungsi utama
        function mulaiHalaman() {
            document.getElementById('welcomeScreen').classList.add('hide');
            document.getElementById('mainContainer').classList.add('show');
            
            const lagu = document.getElementById('laguAyang');
            
            // Memastikan volume penuh dan memutar lagu
            lagu.volume = 1.0; 
            
            // Kita beri sedikit delay 100ms agar transisi animasi welcome screen selesai
            setTimeout(() => {
                lagu.play().then(() => {
                    console.log("Musik berhasil diputar otomatis!");
                }).catch(error => {
                    console.log("Gagal putar musik karena:", error);
                });
            }, 100);

            // Mulai memunculkan animasi hati berjatuhan
            setInterval(createHeart, 250); // Frekuensi kemunculan sedikit ditingkatkan
        }
    </script>

</body>
</html>
