<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Chainn Cantik Tersayang ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.6), rgba(255, 194, 209, 0.6)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Halaman Pembuka */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.7), rgba(255, 194, 209, 0.7)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .btn-buka {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff477e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* Kontainer Utama Glassmorphism */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 35px 25px;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(255, 71, 126, 0.2);
            display: none;
            transition: all 0.5s ease;
        }

        .container.show {
            display: block;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Bingkai Foto */
        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff85a1;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: softZoom 8s ease-in-out infinite alternate;
        }

        /* Teks */
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        p {
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
        }

        /* Area Tombol Pilihan */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 5px; /* Margin bawah dikurangi agar layout lebih padat dan rapi */
            position: relative;
            min-height: 80px;
        }

        .btn-choice {
            width: 150px;
            height: 50px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        #btnYa {
            background-color: #2ec4b6;
            color: white;
        }

        #btnYa:hover {
            transform: scale(1.1);
            background-color: #20a396;
        }

        #btnTidak {
            background-color: #e63946;
            color: white;
            position: relative;
            z-index: 99;
            transition: all 0.15s ease;
        }

        /* MUSIK KONTROL DISEMBUYINKAN TOTAL */
        .music-box {
            display: none;
        }

        /* Elemen Jatuh dari Paling Atas */
        .falling-item {
            position: fixed;
            top: -60px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 9999;
        }

        /* Animasi Jatuh */
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes softZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Layar Pembuka -->
    <div class="welcome-screen" id="welcomeScreen">
        <h2 style="color: #ff477e; margin-bottom: 20px; text-shadow: 1px 1px 5px white;">DIBACA YA SAYANG ✨</h2>
        <button class="btn-buka" onclick="mulaiHalaman()">Klik di Sini ❤️</button>
    </div>

    <!-- Kontainer Utama -->
    <div class="container" id="mainContainer">
        <div class="photo-frame">
            <img id="displayFoto" src="foto_kita.jpeg" alt="Foto Kita">
        </div>

        <h1 id="titleText">Untuk Chainn Cantik Tersayang... ❤️</h1>
        
        <p id="bodyText">
            "MAAF YA CINTAKUUU SUDAH GIGIT TANGANMU SAMPE BIRU, AKU JANJI TIDAK AKAN MENGULANGINYA"
        </p>

        <!-- Wrapper Tombol Pilihan -->
        <div class="btn-wrapper" id="btnWrapper">
            <button class="btn-choice" id="btnYa" onclick="aksiDimaafkan()">Dimaafkan ❤️</button>
            <button class="btn-choice" id="btnTidak" onmouseover="hindariTombol()" onclick="hindariTombol()" ontouchstart="hindariTombol(event)">Gak! 😜</button>
        </div>

        <!-- Musik Latar (Atribut 'controls' dihapus dan dimasukkan ke kelas 'music-box' yang disembunyikan) -->
        <div class="music-box">
            <audio id="laguAyang" loop preload="auto">
                <source src="musik_kita.mp3" type="audio/mpeg">
                Browser kamu tidak mendukung pemutar musik ini.
            </audio>
        </div>
    </div>

    <script>
        let dimaafkanState = false;

        // Fungsi membuat objek berjatuhan
        function createFallingItem(symbol) {
            const item = document.createElement('div');
            item.classList.add('falling-item');
            item.innerHTML = symbol;
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 2.5 + 2.5 + 's'; 
            item.style.fontSize = Math.random() * 25 + 25 + 'px'; 
            document.body.appendChild(item);

            setTimeout(() => {
                item.remove();
            }, 5500);
        }

        // Interval dasar hujan hati pembuka
        let heartInterval;
        function startHearts() {
            heartInterval = setInterval(() => {
                createFallingItem('❤️');
            }, 350);
        }

        // Fungsi menghindar
        function hindariTombol(e) {
            if (e) e.preventDefault(); 
            const btnTidak = document.getElementById('btnTidak');
            
            btnTidak.style.position = 'fixed';
            
            btnTidak.style.width = '180px';
            btnTidak.style.height = '65px';
            btnTidak.style.fontSize = '22px';
            btnTidak.style.borderRadius = '35px';

            const maxX = window.innerWidth - 180 - 40;
            const maxY = window.innerHeight - 65 - 40;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            btnInsideX = randomX;
            btnInsideY = randomY;
            
            btnTidak.style.left = randomX + 'px';
            btnTidak.style.top = randomY + 'px';
        }

        // Fungsi saat "Dimaafkan" diklik
        function aksiDimaafkan() {
            if (dimaafkanState) return; 
            dimaafkanState = true;

            clearInterval(heartInterval);

            document.getElementById('titleText').innerHTML = "YEYY! MAKASIH SAYANG! 🥰";
            document.getElementById('bodyText').innerHTML = "Cintaku emang yang paling baik sedunia! I Love You So Much, Chainn Cantikku! 💖🌻";
            
            document.getElementById('btnWrapper').style.display = 'none';

            const emotes = ['😊', '❤️', '💖', '🥰', '✨', '🌸', '🌹', '😍', '💕'];

            // Ledakan instan 50 emotikon pertama
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                }, Math.random() * 800);
            }

            // Hujan deras berkelanjutan
            let boomDuration = 6000;
            let endBoom = Date.now() + boomDuration;

            let boomInterval = setInterval(() => {
                if (Date.now() > endBoom) {
                    clearInterval(boomInterval);
                    setInterval(() => {
                        createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                    }, 100);
                    return;
                }
                
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
            }, 45);
        }

        // Memulai halaman & memutar musik di latar belakang
        function mulaiHalaman() {
            document.getElementById('welcomeScreen').classList.add('hide');
            document.getElementById('mainContainer').classList.add('show');
            
            const lagu = document.getElementById('laguAyang');
            lagu.volume = 1.0; 
            
            setTimeout(() => {
                lagu.play().then(() => {
                    console.log("Musik diputar di latar belakang!");
                }).catch(error => {
                    console.log("Gagal memutar musik:", error);
                });
            }, 100);

            startHearts();
        }
    </script>

</body>
</html>
