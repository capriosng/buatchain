<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Chainn Cantik Tersayang ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.6), rgba(255, 194, 209, 0.6)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Halaman Pembuka */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 229, 236, 0.7), rgba(255, 194, 209, 0.7)), 
                        url('foto_kita.jpeg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .btn-buka {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff477e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* Kontainer Utama Glassmorphism */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 35px 25px;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 8px 32px 0 rgba(255, 71, 126, 0.2);
            display: none;
            transition: all 0.5s ease;
        }

        .container.show {
            display: block;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Bingkai Foto */
        .photo-frame {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff85a1;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: softZoom 8s ease-in-out infinite alternate;
        }

        /* Teks */
        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
        }

        p {
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.4);
        }

        /* Area Tombol Pilihan */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn-choice {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        #btnYa {
            background-color: #2ec4b6;
            color: white;
        }

        #btnYa:hover {
            transform: scale(1.1);
            background-color: #20a396;
        }

        /* Tombol Gak Dimaafkan (Diberi Posisi Absolute saat Interaksi) */
        #btnTidak {
            background-color: #e63946;
            color: white;
            position: relative;
            z-index: 99;
        }

        /* Musik Kontrol */
        .music-box {
            margin-top: 10px;
        }

        audio {
            width: 100%;
            max-width: 280px;
            border-radius: 30px;
        }

        /* Elemen Jatuh (Hati & Emotikon) */
        .falling-item {
            position: absolute;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        /* Animasi */
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes softZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Layar Pembuka -->
    <div class="welcome-screen" id="welcomeScreen">
        <h2 style="color: #ff477e; margin-bottom: 20px; text-shadow: 1px 1px 5px white;">DIBACA YA SAYANG ✨</h2>
        <button class="btn-buka" onclick="mulaiHalaman()">Klik di Sini ❤️</button>
    </div>

    <!-- Kontainer Utama -->
    <div class="container" id="mainContainer">
        <div class="photo-frame">
            <!-- ID ditambahkan pada tag img untuk mempermudah penggantian gambar lewat JS -->
            <img id="displayFoto" src="foto_kita.jpeg" alt="Foto Kita">
        </div>

        <h1 id="titleText">Untuk Chainn Cantik Tersayang... ❤️</h1>
        
        <p id="bodyText">
            "SELAMAT PAGIIII CINTAKUUUU, JANGAN BANYAK MAKAN GADUNG YA. MAAFIN AKU YA?"
        </p>

        <!-- Wrapper Tombol Pilihan Baru -->
        <div class="btn-wrapper" id="btnWrapper">
            <button class="btn-choice" id="btnYa" onclick="aksiDimaafkan()">Dimaafkan ❤️</button>
            <button class="btn-choice" id="btnTidak" onmouseover="hindariTombol()" onclick="hindariTombol()" ontouchstart="hindariTombol(event)">Gak! 😜</button>
        </div>

        <div class="music-box">
            <audio id="laguAyang" controls loop preload="auto">
                <source src="musik_kita.mp3" type="audio/mpeg">
                Browser kamu tidak mendukung pemutar musik ini.
            </audio>
        </div>
    </div>

    <script>
        let dimaafkanState = false;

        // Fungsi membuat objek berjatuhan (bisa Hati atau Emotikon Senyum)
        function createFallingItem(symbol) {
            const item = document.createElement('div');
            item.classList.add('falling-item');
            item.innerHTML = symbol;
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 3 + 3 + 's';
            item.style.fontSize = Math.random() * 30 + 30 + 'px'; 
            document.body.appendChild(item);

            setTimeout(() => {
                item.remove();
            }, 6000);
        }

        // Interval dasar untuk memunculkan Hati secara berkala
        let heartInterval;
        function startHearts() {
            heartInterval = setInterval(() => {
                createFallingItem('❤️');
            }, 300);
        }

        // Fungsi agar tombol "Gak" selalu menghindari kursor atau sentuhan jari
        function hindariTombol(e) {
            if (e) e.preventDefault(); // Mencegah zoom/click bawaan HP saat ditap
            const btnTidak = document.getElementById('btnTidak');
            
            // Mengubah posisi tombol menjadi absolut agar bebas bergerak di layar luar batas wrapper
            btnTidak.style.position = 'fixed';
            
            // Batasan area acak agar tombol tidak keluar layar
            const maxX = window.innerWidth - btnTidak.offsetWidth - 20;
            const maxY = window.innerHeight - btnTidak.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * maxX));
            const randomY = Math.max(10, Math.floor(Math.random() * maxY));
            
            btnTargetX = randomX;
            btnTargetY = randomY;
            
            btnTidak.style.left = randomX + 'px';
            btnTriangleTop = btnTidak.style.top = randomY + 'px';
        }

        // Fungsi yang dipicu saat tombol "Dimaafkan" diklik
        function aksiDimaafkan() {
            if (dimaafkanState) return; // Mencegah klik ganda
            dimaafkanState = true;

            // Hentikan hujan hati biasa
            clearInterval(heartInterval);

            // Ganti Teks Judul dan Pesan Utama
            document.getElementById('titleText').innerHTML = "YEYY! MAKASIH SAYANG! 🥰";
            document.getElementById('bodyText').innerHTML = "Cintaku emang yang paling baik sedunia! I Love You So Much, Chainn Cantikku! 💖🌻";
            
            // Sembunyikan tombol pilihan
            document.getElementById('btnWrapper').style.display = 'none';

            // Ganti foto utama jika ada foto versi senang/senyum (opsional, ganti nama file jika perlu)
            // document.getElementById('displayFoto').src = 'foto_senang.jpeg'; 

            // Efek Hujan Emotikon Cinta & Senyum secara masif selama 6 detik
            let boomDuration = 6000;
            let endBoom = Date.now() + boomDuration;

            const emotes = ['😊', '❤️', '💖', '🥰', '✨', '🌸'];

            let boomInterval = setInterval(() => {
                if (Date.now() > endBoom) {
                    clearInterval(boomInterval);
                    // Setelah pesta ledakan usai, kembali ke hujan cinta + senyum yang lebih santai
                    setInterval(() => {
                        createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                    }, 400);
                    return;
                }
                // Memunculkan banyak emotikon sekaligus saat tombol ditekan
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
                createFallingItem(emotes[Math.floor(Math.random() * emotes.length)]);
            }, 80);
        }

        // Memulai halaman utama
        function mulaiHalaman() {
            document.getElementById('welcomeScreen').classList.add('hide');
            document.getElementById('mainContainer').classList.add('show');
            
            const lagu = document.getElementById('laguAyang');
            lagu.volume = 1.0; 
            
            setTimeout(() => {
                lagu.play().then(() => {
                    console.log("Musik berhasil diputar!");
                }).catch(error => {
                    console.log("Gagal memutar musik:", error);
                });
            }, 100);

            // Jalankan hujan hati pembuka
            startHearts();
        }
    </script>

</body>
</html>
