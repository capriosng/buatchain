<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Chainn Cantik Tersayang ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Halaman Pembuka (Overlay) */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        .welcome-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        .btn-buka {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff477e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            animation: pulse 1.5s infinite;
        }

        /* Kontainer Utama */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            display: none; /* Sembunyi dulu sebelum diklik */
        }

        .container.show {
            display: block;
            animation: fadeIn 2s ease-in-out;
        }

        /* Bingkai Foto dengan Animasi Zoom */
        .photo-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff85a1;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: softZoom 8s ease-in-out infinite alternate;
        }

        /* Teks Romantis */
        h1 {
            color: #ff477e;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #4a4a4a;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Musik Kontrol */
        .music-box {
            margin-top: 15px;
        }

        audio {
            width: 100%;
            max-width: 300px;
            border-radius: 30px;
        }

        /* Animasi Hati Berjatuhan */
        .heart {
            position: absolute;
            color: #ff7096;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 1;
        }

        /* Kumpulan Keyframes Animasi */
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes softZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Halaman Awal untuk Memicu Autoplay Musik -->
    <div class="welcome-screen" id="welcomeScreen">
        <h2 style="color: #ff477e; margin-bottom: 20px;">DIBACA YA SAYANG ✨</h2>
        <button class="btn-buka" onclick="mulaiHalaman()">Klik di Sini ❤️</button>
    </div>

    <!-- Konten Utama -->
    <div class="container" id="mainContainer">
        <div class="photo-frame">
            <img src="foto_kita.jpeg" alt="Foto Kita">
        </div>

        <h1>Untuk Chainn Cantik Tersayang... ❤️</h1>
        
        <p>
            "SELAMAT PAGIIII CINTAKUUUU, JANGAN BANYAK MAKAN GADUNG YA"
        </p>

        <!-- Pemutar Musik -->
        <div class="music-box">
            <audio id="laguAyang" controls loop>
                <source src="musik_kita.mpeg" type="audio/mpeg">
                Browser kamu tidak mendukung pemutar musik ini.
            </audio>
        </div>
    </div>

    <script>
        // Efek Animasi Hati Berjatuhan
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Fungsi saat tombol diklik: Sembunyikan pembuka, munculkan konten, dan putar musik
        function mulaiHalaman() {
            document.getElementById('welcomeScreen').classList.add('hide');
            document.getElementById('mainContainer').classList.add('show');
            
            // Memutar musik otomatis setelah interaksi klik
            const lagu = document.getElementById('laguAyang');
            lagu.play().catch(error => {
                console.log("Autoplay dicegah oleh browser:", error);
            });

            // Mulai memunculkan animasi hati berjatuhan
            setInterval(createHeart, 300);
        }
    </script>

</body>
</html>
